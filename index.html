<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Aledson Britol</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    :root {
      --brand: #4f46e5;
      --brand2: #7c3aed;
    }

    * { box-sizing: border-box; }

    body {
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem 3rem;
      font-family: 'Segoe UI', sans-serif;
    }

    /* ── Card wrapper ── */
    .app-card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.10);
      overflow: hidden;
    }

    /* ── Header ── */
    .app-header {
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      padding: 1.75rem 1.75rem 1.5rem;
      color: #fff;
    }
    .app-header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      margin: 0 0 .25rem;
    }
    .app-header p {
      font-size: .85rem;
      opacity: .85;
      margin: 0;
    }

    /* ── Status badge ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .75rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .s-off     { background: rgba(255,255,255,.20); color: #fff; }
    .s-loading { background: #fef3c7; color: #b45309; }
    .s-live    { background: #d1fae5; color: #065f46; }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    .d-off     { background: rgba(255,255,255,.7); }
    .d-loading { background: #f59e0b; }
    .d-live    { background: #10b981; animation: blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Body ── */
    .app-body { padding: 1.75rem; }

    /* ── Webcam area ── */
    .cam-wrapper {
      background: #f0f2f5;
      border: 2px dashed #d1d5db;
      border-radius: 1rem;
      min-height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: border-color .3s;
      margin-bottom: 1.25rem;
    }
    .cam-wrapper.active {
      border: none;
      background: #000;
    }
    .cam-wrapper canvas {
      width: 100% !important;
      height: auto !important;
      display: block;
      border-radius: .75rem;
    }
    .cam-placeholder {
      text-align: center;
      color: #9ca3af;
    }
    .cam-placeholder svg {
      width: 52px; height: 52px;
      margin-bottom: .5rem;
      opacity: .5;
    }
    .cam-placeholder p {
      font-size: .82rem;
      margin: 0;
    }

    /* ── Permission button ── */
    .btn-permission {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      width: 100%;
      padding: .8rem 1.5rem;
      border-radius: .85rem;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-bottom: 1.5rem;
    }
    .btn-permission:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn-permission:active:not(:disabled) { transform: scale(.98); }
    .btn-permission:disabled { opacity: .55; cursor: not-allowed; }
    .btn-permission svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* ── Predictions ── */
    .section-title {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #9ca3af;
      margin-bottom: .75rem;
    }

    .pred-item {
      background: #f8f7ff;
      border: 1px solid #ede9fe;
      border-radius: .85rem;
      padding: .7rem 1rem;
      margin-bottom: .6rem;
    }
    .pred-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .35rem;
    }
    .pred-name {
      font-size: .875rem;
      font-weight: 600;
      color: #374151;
    }
    .pred-pct {
      font-size: .85rem;
      font-weight: 700;
      color: var(--brand);
      min-width: 38px;
      text-align: right;
    }
    .pred-bar-bg {
      width: 100%;
      height: 8px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }
    .pred-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--brand), var(--brand2));
      transition: width .22s ease;
      width: 0%;
    }

    /* ── Footer ── */
    .app-footer {
      margin-top: 1.5rem;
      font-size: .75rem;
      color: #9ca3af;
      text-align: center;
    }
    .app-footer a { color: #6d6ae0; text-decoration: none; }
    .app-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="app-card">

  <!-- Header -->
  <div class="app-header d-flex justify-content-between align-items-start">
    <div>
      <h1>Aledson Britol</h1>
      <p>Classificação de imagens com IA em tempo real</p>
    </div>
    <span class="status-badge s-off" id="status-badge">
      <span class="dot d-off" id="status-dot"></span>
      <span id="status-text">Inativo</span>
    </span>
  </div>

  <!-- Body -->
  <div class="app-body">

    <!-- Webcam -->
    <div class="cam-wrapper" id="cam-wrapper">
      <div class="cam-placeholder" id="cam-placeholder">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
        </svg>
        <p>Câmera será exibida aqui</p>
      </div>
      <div id="webcam-container"></div>
    </div>

    <!-- Botão de permissão / iniciar -->
    <button class="btn-permission" id="btn-start" onclick="init()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
      </svg>
      <span id="btn-text">Permitir câmera e iniciar</span>
    </button>

    <!-- Predições -->
    <div id="predictions-section" style="display:none;">
      <p class="section-title">Nível de correspondência por classe</p>
      <div id="label-container"></div>
    </div>

  </div>
</div>

<div class="app-footer">
  Powered by <a href="https://teachablemachine.withgoogle.com/" target="_blank">Teachable Machine</a> &amp; TensorFlow.js
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
  const MODEL_URL = "https://teachablemachine.withgoogle.com/models/X6-MME4uz/";
  let model, webcam, labelContainer, maxPredictions;

  function setStatus(state) {
    const badge = document.getElementById("status-badge");
    const dot   = document.getElementById("status-dot");
    const text  = document.getElementById("status-text");
    badge.className = "status-badge";
    dot.className   = "dot";
    if (state === "loading") {
      badge.classList.add("s-loading"); dot.classList.add("d-loading"); text.textContent = "Carregando…";
    } else if (state === "live") {
      badge.classList.add("s-live"); dot.classList.add("d-live"); text.textContent = "Ao vivo";
    } else {
      badge.classList.add("s-off"); dot.classList.add("d-off"); text.textContent = "Inativo";
    }
  }

  async function init() {
    const btn     = document.getElementById("btn-start");
    const btnText = document.getElementById("btn-text");

    btn.disabled  = true;
    btnText.textContent = "Aguardando permissão da câmera…";
    setStatus("loading");

    try {
      // Solicita permissão explícita da câmera antes de carregar o modelo
      await navigator.mediaDevices.getUserMedia({ video: true });

      btnText.textContent = "Carregando modelo de IA…";

      model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
      maxPredictions = model.getTotalClasses();

      webcam = new tmImage.Webcam(400, 400, true);
      await webcam.setup();
      await webcam.play();
      window.requestAnimationFrame(loop);

      // Ativa área da câmera
      const wrapper = document.getElementById("cam-wrapper");
      wrapper.classList.add("active");
      document.getElementById("cam-placeholder").style.display = "none";
      document.getElementById("webcam-container").appendChild(webcam.canvas);

      // Monta os itens de predição
      labelContainer = document.getElementById("label-container");
      labelContainer.innerHTML = "";
      for (let i = 0; i < maxPredictions; i++) {
        const item = document.createElement("div");
        item.className = "pred-item";
        item.innerHTML = `
          <div class="pred-top">
            <span class="pred-name" id="name-${i}">—</span>
            <span class="pred-pct" id="pct-${i}">0%</span>
          </div>
          <div class="pred-bar-bg">
            <div class="pred-bar-fill" id="bar-${i}"></div>
          </div>`;
        labelContainer.appendChild(item);
      }

      document.getElementById("predictions-section").style.display = "block";
      btn.style.display = "none"; // esconde botão após iniciar

      setStatus("live");

    } catch (err) {
      btn.disabled = false;
      btnText.textContent = "Permitir câmera e iniciar";
      setStatus("off");
      if (err.name === "NotAllowedError") {
        alert("Permissão da câmera negada. Por favor, permita o acesso à câmera no navegador e tente novamente.");
      } else {
        alert("Erro ao iniciar: " + err.message);
      }
    }
  }

  async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
  }

  async function predict() {
    const prediction = await model.predict(webcam.canvas);
    for (let i = 0; i < maxPredictions; i++) {
      const prob = prediction[i].probability;
      const pct  = Math.round(prob * 100);
      document.getElementById("name-" + i).textContent = prediction[i].className;
      document.getElementById("pct-"  + i).textContent = pct + "%";
      document.getElementById("bar-"  + i).style.width = pct + "%";
    }
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
